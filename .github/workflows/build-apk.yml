name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'public/manifest.json'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Build Tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore keystore.jks \
            -alias upload \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Kata kata, OU=App, O=cura4world, L=Seoul, S=Seoul, C=KR"

      - name: Create twa-manifest.json
        run: |
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "io.github.cura4world.twa",
            "host": "cura4world.github.io",
            "name": "Kata kata",
            "launcherName": "Kata kata",
            "display": "standalone",
            "themeColor": "#003d5c",
            "navigationColor": "#003d5c",
            "navigationColorDark": "#003d5c",
            "navigationDividerColor": "#003d5c",
            "navigationDividerColorDark": "#003d5c",
            "backgroundColor": "#003d5c",
            "enableNotifications": false,
            "startUrl": "/idkr-buddy/",
            "iconUrl": "https://cura4world.github.io/idkr-buddy/icon-512x512.png",
            "maskableIconUrl": "https://cura4world.github.io/idkr-buddy/icon-512x512.png",
            "monochromeIconUrl": "https://cura4world.github.io/idkr-buddy/icon-512x512.png",
            "appVersion": "1.0.0",
            "appVersionCode": 1,
            "signingKey": {
              "path": "../keystore.jks",
              "alias": "upload"
            },
            "splashScreenFadeOutDuration": 300,
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://cura4world.github.io/idkr-buddy/",
            "minSdkVersion": 21,
            "orientation": "default",
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://cura4world.github.io/idkr-buddy/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": { "enabled": false },
            "enableSideNavigation": false,
            "fingerprints": [],
            "serviceAccountJsonFile": ""
          }
          EOF

      - name: Build APK
        run: |
          mkdir apk-build
          cp twa-manifest.json apk-build/
          cd apk-build
          bubblewrap build \
            --skipPwaValidation \
            --signingKeyPassword android \
            --signingKeyStorePassword android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kata-kata-apk
          path: apk-build/app-release-signed.apk
