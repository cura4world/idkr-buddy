name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'public/manifest.json'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Build Tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore keystore.jks \
            -alias upload \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Kata kata, OU=App, O=cura4world, L=Seoul, S=Seoul, C=KR"

      - name: Download app icon
        run: |
          curl -sL "https://cura4world.github.io/idkr-buddy/icon-512x512.png" -o icon-original.png
          sudo apt-get install -y imagemagick -q
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          convert icon-original.png -resize 48x48   app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert icon-original.png -resize 72x72   app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert icon-original.png -resize 96x96   app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert icon-original.png -resize 144x144 app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert icon-original.png -resize 192x192 app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Create WebView Android project
        run: |
          mkdir -p app/src/main/java/io/github/cura4world/twa
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "KataKata"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          EOF

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'io.github.cura4world.twa'
              compileSdk 34
              defaultConfig {
                  applicationId 'io.github.cura4world.twa'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.0.0'
              }
              signingConfigs {
                  release {
                      storeFile file('../keystore.jks')
                      storePassword 'android'
                      keyAlias 'upload'
                      keyPassword 'android'
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          curl -s https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew -o gradlew
          chmod +x gradlew
          curl -sL "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:allowBackup="true"
                  android:label="@string/app_name"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher"
                  android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|screenLayout|uiMode">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Kata kata</string>
          </resources>
          EOF

          cat > app/src/main/java/io/github/cura4world/twa/MainActivity.java << 'EOF'
          package io.github.cura4world.twa;

          import android.app.Activity;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.speech.tts.TextToSpeech;
          import android.view.WindowManager;
          import android.webkit.JavascriptInterface;
          import android.webkit.ValueCallback;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import java.util.Locale;

          public class MainActivity extends Activity {

              private WebView webView;
              private TextToSpeech tts;
              private boolean ttsReady = false;
              private ValueCallback<Uri[]> fileCallback;
              private static final int FILE_CHOOSER_REQUEST = 1001;

              // JavaScript 인터페이스: 웹에서 window.AndroidTTS.speak() 호출
              private class TTSInterface {
                  @JavascriptInterface
                  public void speak(String text, String langCode) {
                      if (!ttsReady) return;
                      Locale locale;
                      if (langCode.startsWith("ko")) {
                          locale = Locale.KOREAN;
                      } else if (langCode.startsWith("id")) {
                          locale = new Locale("id", "ID");
                      } else {
                          locale = Locale.getDefault();
                      }
                      int result = tts.setLanguage(locale);
                      if (result == TextToSpeech.LANG_MISSING_DATA || result == TextToSpeech.LANG_NOT_SUPPORTED) {
                          tts.setLanguage(Locale.getDefault());
                      }
                      tts.setSpeechRate(0.9f);
                      tts.speak(text, TextToSpeech.QUEUE_FLUSH, null, "tts_" + System.currentTimeMillis());
                  }

                  @JavascriptInterface
                  public void stop() {
                      if (ttsReady) tts.stop();
                  }

                  @JavascriptInterface
                  public boolean isReady() {
                      return ttsReady;
                  }
              }

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  // 화면 켜짐 유지 (자동플레이 중 화면 꺼짐 방지)
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);

                  // 네이티브 TTS 초기화
                  tts = new TextToSpeech(this, status -> {
                      if (status == TextToSpeech.SUCCESS) {
                          ttsReady = true;
                      }
                  });

                  webView = new WebView(this);
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setAllowContentAccess(true);
                  settings.setCacheMode(WebSettings.LOAD_DEFAULT);
                  settings.setMediaPlaybackRequiresUserGesture(false);

                  // TTS JavaScript 인터페이스 등록
                  webView.addJavascriptInterface(new TTSInterface(), "AndroidTTS");

                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, String url) {
                          // 앱 내부 URL만 허용 (외부 링크 방지)
                          if (url.startsWith("https://cura4world.github.io/idkr-buddy")) {
                              return false;
                          }
                          return true;
                      }
                  });

                  // 파일 선택 지원 (CSV 불러오기)
                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public boolean onShowFileChooser(WebView webView,
                              ValueCallback<Uri[]> filePathCallback,
                              FileChooserParams fileChooserParams) {
                          if (fileCallback != null) {
                              fileCallback.onReceiveValue(null);
                          }
                          fileCallback = filePathCallback;
                          Intent intent = fileChooserParams.createIntent();
                          try {
                              startActivityForResult(intent, FILE_CHOOSER_REQUEST);
                          } catch (Exception e) {
                              fileCallback = null;
                              return false;
                          }
                          return true;
                      }
                  });

                  webView.loadUrl("https://cura4world.github.io/idkr-buddy/");
                  setContentView(webView);
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  if (requestCode == FILE_CHOOSER_REQUEST) {
                      if (fileCallback == null) return;
                      Uri[] results = null;
                      if (resultCode == Activity.RESULT_OK && data != null) {
                          String dataString = data.getDataString();
                          if (dataString != null) {
                              results = new Uri[]{Uri.parse(dataString)};
                          }
                      }
                      fileCallback.onReceiveValue(results);
                      fileCallback = null;
                  }
              }

              @Override
              public void onBackPressed() {
                  // 화면 잠금 오버레이가 있으면 뒤로가기 무시
                  // 웹 앱 내 history가 있으면 앱 뒤로가기
                  if (webView.canGoBack()) {
                      webView.evaluateJavascript(
                          "(function(){ return window.location.pathname; })()",
                          value -> {
                              // 홈 경로가 아니면 뒤로가기
                              if (value != null && !value.contains("/idkr-buddy/"")) {
                                  runOnUiThread(() -> webView.goBack());
                              }
                              // 홈이면 아무것도 안 함 (앱 종료 방지)
                          }
                      );
                  }
                  // super.onBackPressed() 호출 안 함 → 앱 종료 방지
              }

              @Override
              protected void onDestroy() {
                  if (tts != null) {
                      tts.stop();
                      tts.shutdown();
                  }
                  super.onDestroy();
              }
          }
          EOF

      - name: Build APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kata-kata-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
