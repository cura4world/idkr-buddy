name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'public/manifest.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Build Tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli@latest

      - name: Create twa-manifest.json
        run: |
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "io.github.cura4world.twa",
            "host": "cura4world.github.io",
            "name": "Kata kata",
            "launcherName": "Kata kata",
            "display": "standalone",
            "themeColor": "#003d5c",
            "navigationColor": "#003d5c",
            "navigationColorDark": "#003d5c",
            "navigationDividerColor": "#003d5c",
            "navigationDividerColorDark": "#003d5c",
            "backgroundColor": "#003d5c",
            "enableNotifications": false,
            "startUrl": "/idkr-buddy/",
            "iconUrl": "https://cura4world.github.io/idkr-buddy/icon-512x512.png",
            "maskableIconUrl": "https://cura4world.github.io/idkr-buddy/icon-512x512.png",
            "monochromeIconUrl": "https://cura4world.github.io/idkr-buddy/icon-512x512.png",
            "appVersion": "1.0.0",
            "appVersionCode": 1,
            "signingKey": {
              "path": "./upload-keystore.jks",
              "alias": "upload"
            },
            "splashScreenFadeOutDuration": 300,
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://cura4world.github.io/idkr-buddy/",
            "minSdkVersion": 21,
            "orientation": "default",
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://cura4world.github.io/idkr-buddy/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": { "enabled": false },
            "enableSideNavigation": false,
            "fingerprints": [],
            "serviceAccountJsonFile": ""
          }
          EOF

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore upload-keystore.jks \
            -alias upload \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Kata kata, OU=App, O=cura4world, L=Seoul, S=Seoul, C=KR"

      - name: Extract SHA256 and update assetlinks.json
        run: |
          SHA256=$(keytool -list -v \
            -keystore upload-keystore.jks \
            -alias upload \
            -storepass android \
            | grep "SHA256:" | awk '{print $2}')
          echo "SHA256: $SHA256"
          mkdir -p public/.well-known
          printf '[{\n  "relation": ["delegate_permission/common.handle_all_urls"],\n  "target": {\n    "namespace": "android_app",\n    "package_name": "io.github.cura4world.twa",\n    "sha256_cert_fingerprints": ["%s"]\n  }\n}]' "$SHA256" > public/.well-known/assetlinks.json
          cat public/.well-known/assetlinks.json

      - name: Commit updated assetlinks.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/.well-known/assetlinks.json
          git diff --staged --quiet || git commit -m "chore: update assetlinks.json"
          git push

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << EOF
          {
            "jdkPath": "$(dirname $(dirname $(readlink -f $(which java))))",
            "androidSdkPath": "$ANDROID_SDK_ROOT"
          }
          EOF

      - name: Build APK with Bubblewrap
        run: |
          mkdir bubblewrap-build
          cp twa-manifest.json bubblewrap-build/twa-manifest.json
          cp upload-keystore.jks bubblewrap-build/upload-keystore.jks
          cd bubblewrap-build
          bubblewrap build \
            --skipPwaValidation \
            --signingKeyPassword android \
            --signingKeyStorePassword android \
            --manifest ./twa-manifest.json

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kata-kata-apk
          path: bubblewrap-build/app-release-signed.apk
          if-no-files-found: error
