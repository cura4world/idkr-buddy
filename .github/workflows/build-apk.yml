name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'public/manifest.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Build Tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Generate or reuse keystore
        run: |
          if [ -f keystore/upload-keystore.jks ]; then
            echo "Reusing existing keystore from repo"
          else
            echo "Generating new keystore"
            mkdir -p keystore
            keytool -genkey -v \
              -keystore keystore/upload-keystore.jks \
              -alias upload \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=Kata kata, OU=App, O=cura4world, L=Seoul, S=Seoul, C=KR"
          fi

      - name: Update assetlinks.json from keystore SHA256
        run: |
          SHA256=$(keytool -list -v \
            -keystore keystore/upload-keystore.jks \
            -alias upload \
            -storepass android \
            | grep "SHA256:" | awk '{print $2}')
          echo "SHA256: $SHA256"
          mkdir -p public/.well-known
          printf '[{\n  "relation": ["delegate_permission/common.handle_all_urls"],\n  "target": {\n    "namespace": "android_app",\n    "package_name": "io.github.cura4world.twa",\n    "sha256_cert_fingerprints": ["%s"]\n  }\n}]' "$SHA256" > public/.well-known/assetlinks.json
          cat public/.well-known/assetlinks.json

      - name: Commit keystore and assetlinks.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f keystore/upload-keystore.jks public/.well-known/assetlinks.json
          git diff --staged --quiet || git commit -m "chore: sync keystore and assetlinks.json"
          git push

      - name: Download and prepare app icons
        run: |
          curl -sL "https://cura4world.github.io/idkr-buddy/icon-512x512.png" -o icon-original.png
          sudo apt-get install -y imagemagick -q
          mkdir -p twa/app/src/main/res/mipmap-mdpi
          mkdir -p twa/app/src/main/res/mipmap-hdpi
          mkdir -p twa/app/src/main/res/mipmap-xhdpi
          mkdir -p twa/app/src/main/res/mipmap-xxhdpi
          mkdir -p twa/app/src/main/res/mipmap-xxxhdpi
          convert icon-original.png -resize 48x48   twa/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert icon-original.png -resize 72x72   twa/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert icon-original.png -resize 96x96   twa/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert icon-original.png -resize 144x144 twa/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert icon-original.png -resize 192x192 twa/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Create Android TWA project
        run: |
          mkdir -p twa/app/src/main/res/values
          mkdir -p twa/gradle/wrapper

          cat > twa/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat > twa/settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "KataKata"
          include ':app'
          EOF

          cat > twa/build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          EOF

          cat > twa/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'io.github.cura4world.twa'
              compileSdk 34
              defaultConfig {
                  applicationId 'io.github.cura4world.twa'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.0.0'
              }
              signingConfigs {
                  release {
                      storeFile file('../../keystore/upload-keystore.jks')
                      storePassword 'android'
                      keyAlias 'upload'
                      keyPassword 'android'
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          cat > twa/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          curl -s https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew \
            -o twa/gradlew
          chmod +x twa/gradlew

          curl -sL "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
            -o twa/gradle/wrapper/gradle-wrapper.jar

          cat > twa/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:allowBackup="true"
                  android:label="@string/app_name"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher"
                  android:theme="@style/Theme.AppCompat.NoActionBar">
                  <meta-data
                      android:name="asset_statements"
                      android:resource="@string/asset_statements" />
                  <activity
                      android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:exported="true">
                      <meta-data
                          android:name="android.support.customtabs.trusted.DEFAULT_URL"
                          android:value="https://cura4world.github.io/idkr-buddy/" />
                      <meta-data
                          android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                          android:value="#003d5c" />
                      <meta-data
                          android:name="android.support.customtabs.trusted.NAVIGATION_BAR_COLOR"
                          android:value="#003d5c" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW" />
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE" />
                          <data
                              android:scheme="https"
                              android:host="cura4world.github.io"
                              android:pathPrefix="/idkr-buddy/" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > twa/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Kata kata</string>
              <string name="asset_statements">[{"relation":["delegate_permission/common.handle_all_urls"],"target":{"namespace":"web","site":"https://cura4world.github.io"}}]</string>
          </resources>
          EOF

      - name: Build APK
        run: |
          cd twa
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kata-kata-apk
          path: twa/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
